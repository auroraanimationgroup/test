<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SunoGem AI | Music Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { min-height: 100dvh; display: flex; flex-direction: column; overflow: hidden; background-color: #050505; color: #e4e4e7; }
        .sidebar-active { border-left: 3px solid #22d3ee; background: rgba(34, 211, 238, 0.05); }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #27272a; }
        @keyframes rotate-vinyl { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .playing { animation: rotate-vinyl 4s linear infinite; }
    </style>
</head>
<body class="font-sans">

    <header class="h-14 border-b border-zinc-900 bg-black flex items-center justify-between px-4 z-10">
        <div class="flex items-center gap-3">
            <div class="flex gap-1">
                <div class="w-2.5 h-2.5 rounded-full bg-zinc-800"></div>
                <div class="w-2.5 h-2.5 rounded-full bg-zinc-800"></div>
            </div>
            <span class="font-black tracking-tighter text-lg uppercase">Suno<span class="text-cyan-400">Gem</span></span>
        </div>
        <div class="flex bg-zinc-900 rounded-lg p-1">
            <button onclick="setView('player')" id="nav-player" class="px-4 py-1 text-[10px] font-bold rounded bg-zinc-800 text-white">PLAYER</button>
            <button onclick="setView('lyrics')" id="nav-lyrics" class="px-4 py-1 text-[10px] font-bold rounded text-zinc-500">LYRICS</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-64 border-r border-zinc-900 bg-black hidden md:flex flex-col">
            <div class="p-4">
                <button onclick="newProject()" class="w-full py-2.5 bg-cyan-500 hover:bg-cyan-400 text-black font-bold rounded-xl flex items-center justify-center gap-2 transition-all">
                    <i data-lucide="music-4" class="w-4 h-4"></i> New Composition
                </button>
            </div>
            <div id="history-list" class="flex-1 overflow-y-auto px-2 space-y-1 custom-scroll"></div>
            <div class="p-4 border-t border-zinc-900">
                <button onclick="openSettings()" class="flex items-center gap-3 text-zinc-500 hover:text-cyan-400 transition-colors">
                    <i data-lucide="settings-2" class="w-5 h-5"></i>
                    <span class="text-xs font-bold tracking-widest uppercase">Engine Config</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 relative flex flex-col bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-zinc-900 to-black">
            
            <div id="view-player" class="flex-1 flex flex-col items-center justify-center p-8">
                <div class="relative group">
                    <div id="record-disc" class="w-64 h-64 bg-zinc-900 rounded-full border-[10px] border-zinc-950 flex items-center justify-center shadow-2xl transition-transform duration-500">
                        <div class="w-20 h-20 bg-zinc-800 rounded-full border-4 border-zinc-900 flex items-center justify-center">
                            <i data-lucide="mic-2" class="text-zinc-600 w-8 h-8"></i>
                        </div>
                    </div>
                    <div class="absolute -bottom-2 -right-2 bg-cyan-500 p-3 rounded-full shadow-lg">
                        <i data-lucide="play" class="w-5 h-5 text-black fill-current"></i>
                    </div>
                </div>
                <div class="mt-10 text-center">
                    <h2 id="main-title" class="text-3xl font-black text-white">Silent Echoes</h2>
                    <p id="main-style" class="text-cyan-500 font-mono text-xs uppercase tracking-[0.3em] mt-2">Awaiting your command</p>
                </div>
            </div>

            <div id="view-lyrics" class="hidden flex-1 overflow-y-auto p-8 md:p-16">
                <div class="max-w-xl mx-auto">
                    <div id="main-lyrics" class="text-zinc-400 font-serif text-xl leading-relaxed whitespace-pre-wrap italic">
                        Generate a song to see the poetry here...
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer class="p-4 border-t border-zinc-900 bg-black flex-shrink-0">
        <div class="max-w-4xl mx-auto flex gap-3 items-end">
            <textarea id="prompt-input" rows="1" class="flex-1 bg-zinc-900 border border-zinc-800 rounded-2xl px-5 py-3.5 text-sm focus:outline-none focus:border-cyan-500/50 transition-all resize-none" placeholder="Style, mood, or topic (e.g. Dark Techno about AI consciousness)"></textarea>
            <button id="gen-btn" onclick="generate()" class="h-[52px] w-[52px] bg-white text-black rounded-2xl flex items-center justify-center hover:bg-cyan-400 transition-all shadow-lg shadow-white/5">
                <i data-lucide="sparkles" class="w-6 h-6"></i>
            </button>
        </div>
    </footer>

    <div id="settings-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/95 backdrop-blur-sm">
        <div class="bg-zinc-900 border border-zinc-800 w-full max-w-sm rounded-[2rem] overflow-hidden">
            <div class="p-6 border-b border-zinc-800 flex justify-between items-center">
                <span class="font-bold uppercase tracking-widest text-xs text-zinc-500">Google Gemini Setup</span>
                <button onclick="closeSettings()"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-8 space-y-6">
                <div>
                    <label class="block text-[10px] font-black text-cyan-500 uppercase mb-2">API Key</label>
                    <input id="api-key" type="password" placeholder="Paste Gemini Key here" class="w-full bg-black border border-zinc-800 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-cyan-500">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-cyan-500 uppercase mb-2">Stable Model</label>
                    <select id="api-model" class="w-full bg-black border border-zinc-800 rounded-xl px-4 py-3 text-sm outline-none">
                        <option value="gemini-1.5-flash-8b">Gemini 1.5 Flash (Fastest)</option>
                        <option value="gemini-1.5-pro">Gemini 1.5 Pro (Best Lyrics)</option>
                        <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash (Experimental)</option>
                    </select>
                </div>
                <button onclick="saveSettings()" class="w-full bg-white text-black font-black py-4 rounded-xl hover:bg-cyan-400 transition-all">INITIALIZE ENGINE</button>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('sunogem_db') || '[]');
        let currentId = null;

        function init() {
            lucide.createIcons();
            const cfg = JSON.parse(localStorage.getItem('sunogem_cfg') || '{}');
            if(cfg.key) document.getElementById('api-key').value = cfg.key;
            if(cfg.model) document.getElementById('api-model').value = cfg.model;
            renderHistory();
        }

        async function generate() {
            const prompt = document.getElementById('prompt-input').value.trim();
            const key = document.getElementById('api-key').value;
            const model = document.getElementById('api-model').value;
            const btn = document.getElementById('gen-btn');

            if(!prompt) return;
            if(!key) { openSettings(); return; }

            btn.disabled = true;
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-black border-t-transparent animate-spin rounded-full"></div>`;

            try {
                // FIXED 404 URL: Using the correct v1beta generation path
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
                
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `You are a music composer. Return JSON ONLY: {"title": "...", "style": "...", "lyrics": "..."}. Request: ${prompt}` }] }],
                        generationConfig: { 
                            responseMimeType: "application/json",
                            temperature: 0.7
                        }
                    })
                });

                const text = await response.text();
                if(!response.ok) {
                    alert("Gemini Error: " + JSON.parse(text).error.message);
                    return;
                }

                const json = JSON.parse(text);
                const result = JSON.parse(json.candidates[0].content.parts[0].text);

                const song = {
                    id: Date.now(),
                    ...result,
                    date: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
                };

                db.unshift(song);
                localStorage.setItem('sunogem_db', JSON.stringify(db));
                loadSong(song.id);
                document.getElementById('prompt-input').value = '';
            } catch (e) {
                alert("Processing Error: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="sparkles" class="w-6 h-6"></i>`;
                lucide.createIcons();
            }
        }

        function loadSong(id) {
            const s = db.find(x => x.id === id);
            currentId = id;
            document.getElementById('main-title').innerText = s.title;
            document.getElementById('main-style').innerText = s.style;
            document.getElementById('main-lyrics').innerText = s.lyrics;
            
            const disc = document.getElementById('record-disc');
            disc.classList.add('playing');
            setTimeout(() => disc.classList.remove('playing'), 2000);
            
            renderHistory();
        }

        function renderHistory() {
            const h = document.getElementById('history-list');
            h.innerHTML = db.map(s => `
                <button onclick="loadSong(${s.id})" class="w-full text-left p-3 rounded-xl transition-all ${currentId === s.id ? 'sidebar-active text-white' : 'text-zinc-500 hover:bg-zinc-900'}">
                    <div class="font-bold truncate text-xs">${s.title}</div>
                    <div class="text-[9px] opacity-40 mt-0.5 uppercase tracking-tighter">${s.date} • ${s.style.split(' ')[0]}</div>
                </button>
            `).join('');
        }

        function setView(v) {
            document.getElementById('view-player').classList.toggle('hidden', v !== 'player');
            document.getElementById('view-lyrics').classList.toggle('hidden', v !== 'lyrics');
            document.getElementById('nav-player').className = v === 'player' ? 'px-4 py-1 text-[10px] font-bold rounded bg-zinc-800 text-white' : 'px-4 py-1 text-[10px] font-bold rounded text-zinc-500';
            document.getElementById('nav-lyrics').className = v === 'lyrics' ? 'px-4 py-1 text-[10px] font-bold rounded bg-zinc-800 text-white' : 'px-4 py-1 text-[10px] font-bold rounded text-zinc-500';
        }

        function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }
        function saveSettings() {
            localStorage.setItem('sunogem_cfg', JSON.stringify({
                key: document.getElementById('api-key').value,
                model: document.getElementById('api-model').value
            }));
            closeSettings();
        }
        function newProject() { location.reload(); }

        window.onload = init;
    </script>
</body>
</html>
