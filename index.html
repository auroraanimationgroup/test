<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SunoGen AI | Music Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Mobile Viewport Fix */
        body {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #09090b;
            color: #fafafa;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); }
        .gradient-border { border: 1px solid; border-image: linear-gradient(to right, #3b82f6, #8b5cf6) 1; }
    </style>
</head>
<body class="font-sans">

    <header class="h-14 border-b border-zinc-800 flex items-center justify-between px-4 flex-shrink-0 bg-zinc-950/50">
        <div class="flex items-center gap-2">
            <div class="flex gap-1.5">
                <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500/50"></div>
                <div class="w-3 h-3 rounded-full bg-green-500/50"></div>
            </div>
            <span class="ml-4 font-bold tracking-tight text-zinc-200">SUNO<span class="text-blue-500">GEN</span></span>
        </div>
        
        <div class="flex items-center gap-2">
            <div class="bg-zinc-900 rounded-lg p-1 flex gap-1">
                <button onclick="setView('preview')" id="btn-preview" class="px-3 py-1 text-xs rounded-md bg-zinc-800 text-white transition-all">Player</button>
                <button onclick="setView('code')" id="btn-code" class="px-3 py-1 text-xs rounded-md text-zinc-400 hover:text-white transition-all">Lyrics</button>
            </div>
            <button onclick="downloadProject()" class="p-2 hover:bg-zinc-800 rounded-lg text-zinc-400" title="Download Song Data">
                <i data-lucide="download" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-64 border-r border-zinc-800 flex flex-col hidden md:flex flex-shrink-0 bg-zinc-950">
            <div class="p-4">
                <button onclick="createNewProject()" class="w-full bg-blue-600 hover:bg-blue-500 text-white rounded-xl py-2.5 flex items-center justify-center gap-2 font-medium transition-all shadow-lg shadow-blue-900/20">
                    <i data-lucide="plus" class="w-4 h-4"></i> New Song
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto px-2 space-y-1" id="project-list">
                </div>

            <div class="p-4 border-t border-zinc-800 mt-auto">
                <button onclick="toggleSettings(true)" class="flex items-center gap-3 text-zinc-400 hover:text-white w-full transition-colors group">
                    <i data-lucide="settings" class="w-5 h-5 group-hover:rotate-45 transition-transform"></i>
                    <span class="text-sm font-medium">Settings</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative bg-zinc-900/30">
            <div id="view-preview" class="flex-1 overflow-y-auto p-6 flex flex-col items-center justify-center">
                <div id="player-container" class="w-full max-w-md text-center space-y-6">
                    <div class="relative group">
                        <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
                        <div class="relative aspect-square w-64 h-64 mx-auto bg-zinc-800 rounded-2xl flex items-center justify-center shadow-2xl border border-zinc-700 overflow-hidden">
                            <i data-lucide="music" id="placeholder-icon" class="w-20 h-20 text-zinc-600"></i>
                            <img id="track-art" src="" class="hidden w-full h-full object-cover">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <h2 id="display-title" class="text-2xl font-bold">Untitiled Track</h2>
                        <p id="display-style" class="text-zinc-500 text-sm italic">Enter a prompt to begin...</p>
                    </div>
                    <div class="flex items-end justify-center gap-1 h-8">
                        <div class="w-1 bg-zinc-700 h-4 rounded-full"></div>
                        <div class="w-1 bg-zinc-700 h-6 rounded-full"></div>
                        <div class="w-1 bg-blue-500 h-8 rounded-full"></div>
                        <div class="w-1 bg-zinc-700 h-5 rounded-full"></div>
                        <div class="w-1 bg-zinc-700 h-7 rounded-full"></div>
                    </div>
                </div>
            </div>

            <div id="view-code" class="hidden flex-1 overflow-y-auto p-6">
                <div class="max-w-2xl mx-auto">
                    <h3 class="text-zinc-500 uppercase text-xs font-bold tracking-widest mb-4">Lyrics & Metadata</h3>
                    <pre id="output-lyrics" class="p-6 bg-zinc-950 rounded-xl border border-zinc-800 text-zinc-300 font-mono text-sm leading-relaxed whitespace-pre-wrap">Generated lyrics will appear here...</pre>
                </div>
            </div>
        </main>
    </div>

    <footer class="p-4 border-t border-zinc-800 bg-zinc-950/80 backdrop-blur-md flex-shrink-0">
        <div class="max-w-4xl mx-auto flex gap-3 items-end">
            <textarea id="user-input" rows="1" 
                class="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600 resize-none transition-all"
                placeholder="Describe the style, mood, and lyrics (e.g., 'A melancholic synthwave song about neon rain in Tokyo')..."></textarea>
            <button onclick="handleSend()" id="send-btn" class="bg-white text-black p-3 rounded-xl hover:bg-zinc-200 transition-all flex-shrink-0">
                <i data-lucide="sparkles" class="w-5 h-5"></i>
            </button>
        </div>
    </footer>

    <div id="settings-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-zinc-900 border border-zinc-800 w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
            <div class="p-6 border-b border-zinc-800 flex justify-between items-center">
                <h2 class="font-bold text-lg">Engine Settings</h2>
                <button onclick="toggleSettings(false)" class="text-zinc-500 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-zinc-500 uppercase mb-1.5">API Endpoint</label>
                    <input id="setting-url" type="text" value="https://openrouter.ai/api/v1/chat/completions" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-zinc-500 uppercase mb-1.5">Gemini / OpenRouter Key</label>
                    <input id="setting-key" type="password" placeholder="sk-or-..." class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-zinc-500 uppercase mb-1.5">Model ID</label>
                    <input id="setting-model" type="text" value="google/gemini-2.0-flash-001" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-blue-500 outline-none">
                </div>
                <button onclick="saveSettings()" class="w-full bg-white text-black font-bold py-2 rounded-lg mt-2 hover:bg-zinc-200 transition-colors">Apply Changes</button>
            </div>
        </div>
    </div>

    <script>
        // --- Core Constants ---
        const SYSTEM_PROMPT = `You are a professional Music Composer and Lyricist. 
        When the user provides a prompt, respond ONLY with a valid JSON object containing:
        {
            "title": "Creative Track Title",
            "style": "Detailed Musical Style/Genre",
            "lyrics": "[Verse 1]\\n...[Chorus]\\n...",
            "visual_prompt": "Description for track cover art"
        }
        Strictly output raw JSON. No markdown backticks.`;

        let projects = JSON.parse(localStorage.getItem('suno_projects') || '[]');
        let currentProjectId = null;

        // --- Logic & Functions ---

        function init() {
            lucide.createIcons();
            loadSettings();
            renderProjects();
            
            // Auto-resize textarea
            const tx = document.getElementById('user-input');
            tx.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const btn = document.getElementById('send-btn');
            const prompt = input.value.trim();
            const apiKey = document.getElementById('setting-key').value;

            if (!prompt) return;
            if (!apiKey) {
                alert("Please enter an API Key in settings first.");
                toggleSettings(true);
                return;
            }

            // UI State: Loading
            btn.disabled = true;
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-black border-t-transparent animate-spin rounded-full"></div>`;

            try {
                const response = await fetch(document.getElementById('setting-url').value, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.href, 
                        'X-Title': 'SunoGen AI'
                    },
                    body: JSON.stringify({
                        model: document.getElementById('setting-model').value,
                        messages: [
                            { role: 'system', content: SYSTEM_PROMPT },
                            { role: 'user', content: prompt }
                        ]
                    })
                });

                // Anti-Crash Logic: Await text first
                const text = await response.text();
                
                if (!response.ok) {
                    alert("API Error: " + text);
                    return;
                }

                // Parse only if OK
                const data = JSON.parse(text);
                const content = data.choices[0].message.content;
                const result = JSON.parse(content.replace(/```json|```/g, ''));

                // Save Project
                const newProject = {
                    id: Date.now(),
                    prompt: prompt,
                    title: result.title,
                    style: result.style,
                    lyrics: result.lyrics,
                    timestamp: new Date().toLocaleString()
                };

                projects.unshift(newProject);
                saveToStorage();
                displayProject(newProject.id);
                input.value = '';
                input.style.height = 'auto';

            } catch (err) {
                console.error(err);
                alert("Generation Failed: Check console or API Settings.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="sparkles" class="w-5 h-5"></i>`;
                lucide.createIcons();
            }
        }

        function displayProject(id) {
            const project = projects.find(p => p.id === id);
            if (!project) return;
            
            currentProjectId = id;
            document.getElementById('display-title').innerText = project.title;
            document.getElementById('display-style').innerText = project.style;
            document.getElementById('output-lyrics').innerText = project.lyrics;
            
            renderProjects();
        }

        function renderProjects() {
            const list = document.getElementById('project-list');
            list.innerHTML = projects.map(p => `
                <button onclick="displayProject(${p.id})" class="w-full text-left p-3 rounded-lg text-sm transition-all ${currentProjectId === p.id ? 'bg-zinc-800 text-white' : 'text-zinc-500 hover:bg-zinc-900 hover:text-zinc-300'}">
                    <div class="font-medium truncate">${p.title}</div>
                    <div class="text-[10px] opacity-50 uppercase mt-1">${p.timestamp}</div>
                </button>
            `).join('');
        }

        // --- Helper Utilities ---

        function setView(view) {
            const isPreview = view === 'preview';
            document.getElementById('view-preview').classList.toggle('hidden', !isPreview);
            document.getElementById('view-code').classList.toggle('hidden', isPreview);
            
            document.getElementById('btn-preview').className = isPreview ? 'px-3 py-1 text-xs rounded-md bg-zinc-800 text-white' : 'px-3 py-1 text-xs rounded-md text-zinc-400 hover:text-white';
            document.getElementById('btn-code').className = !isPreview ? 'px-3 py-1 text-xs rounded-md bg-zinc-800 text-white' : 'px-3 py-1 text-xs rounded-md text-zinc-400 hover:text-white';
        }

        function toggleSettings(show) {
            document.getElementById('settings-modal').classList.toggle('hidden', !show);
        }

        function createNewProject() {
            currentProjectId = null;
            document.getElementById('display-title').innerText = "Untitled Track";
            document.getElementById('display-style').innerText = "Enter a prompt to begin...";
            document.getElementById('output-lyrics').innerText = "Generated lyrics will appear here...";
            renderProjects();
        }

        function saveSettings() {
            localStorage.setItem('suno_settings', JSON.stringify({
                url: document.getElementById('setting-url').value,
                key: document.getElementById('setting-key').value,
                model: document.getElementById('setting-model').value
            }));
            toggleSettings(false);
        }

        function loadSettings() {
            const saved = JSON.parse(localStorage.getItem('suno_settings') || '{}');
            if (saved.url) document.getElementById('setting-url').value = saved.url;
            if (saved.key) document.getElementById('setting-key').value = saved.key;
            if (saved.model) document.getElementById('setting-model').value = saved.model;
        }

        function saveToStorage() {
            localStorage.setItem('suno_projects', JSON.stringify(projects));
        }

        function downloadProject() {
            if (!currentProjectId) return;
            const project = projects.find(p => p.id === currentProjectId);
            const blob = new Blob([JSON.stringify(project, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${project.title.replace(/\s+/g, '_')}.json`;
            a.click();
        }

        // Initialize
        window.onload = init;
    </script>
</body>
</html>
