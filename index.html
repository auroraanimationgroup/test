<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SunoGen | Gemini AI Music</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #0c0c0e;
            color: #e4e4e7;
        }
        .glass-panel { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(16px); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .loading-pulse { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body class="font-sans antialiased">

    <header class="h-14 border-b border-zinc-800 flex items-center justify-between px-4 flex-shrink-0 bg-zinc-950">
        <div class="flex items-center gap-3">
            <div class="flex gap-1.5">
                <div class="w-3 h-3 rounded-full bg-zinc-700"></div>
                <div class="w-3 h-3 rounded-full bg-zinc-700"></div>
                <div class="w-3 h-3 rounded-full bg-zinc-700"></div>
            </div>
            <h1 class="font-black text-xl tracking-tighter text-white">SUNO<span class="text-cyan-500">GEM</span></h1>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="bg-zinc-900 border border-zinc-800 rounded-full p-1 flex items-center">
                <button onclick="setView('preview')" id="btn-preview" class="px-4 py-1 text-xs font-bold rounded-full bg-cyan-600 text-white transition-all">PLAYER</button>
                <button onclick="setView('code')" id="btn-code" class="px-4 py-1 text-xs font-bold rounded-full text-zinc-500 hover:text-white transition-all">LYRICS</button>
            </div>
            <button onclick="downloadProject()" class="p-2 hover:bg-zinc-800 rounded-full transition-colors">
                <i data-lucide="download-cloud" class="w-5 h-5 text-zinc-400"></i>
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-72 border-r border-zinc-800 flex flex-col hidden lg:flex flex-shrink-0 bg-zinc-950/50">
            <div class="p-5">
                <button onclick="createNewProject()" class="w-full bg-white hover:bg-zinc-200 text-black rounded-xl py-3 flex items-center justify-center gap-2 font-bold transition-transform active:scale-95">
                    <i data-lucide="music-2" class="w-4 h-4"></i> Generate New
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto px-3 space-y-2 custom-scroll" id="project-list">
                </div>

            <div class="p-5 border-t border-zinc-800">
                <button onclick="toggleSettings(true)" class="flex items-center gap-3 text-zinc-500 hover:text-cyan-400 w-full transition-colors group">
                    <i data-lucide="key-round" class="w-5 h-5 group-hover:rotate-12 transition-transform"></i>
                    <span class="text-sm font-bold uppercase tracking-widest">Gemini Settings</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-zinc-900 via-zinc-950 to-black">
            
            <div id="view-preview" class="flex-1 flex flex-col items-center justify-center p-8">
                <div class="w-full max-w-md bg-zinc-900/40 border border-zinc-800 p-8 rounded-[2rem] shadow-2xl backdrop-blur-md text-center">
                    <div class="relative mb-8 mx-auto w-56 h-56 group">
                        <div class="absolute -inset-4 bg-cyan-500/20 rounded-full blur-3xl opacity-0 group-hover:opacity-100 transition duration-700"></div>
                        <div id="vinyl-record" class="w-full h-full bg-zinc-800 rounded-full border-4 border-zinc-700 flex items-center justify-center shadow-inner overflow-hidden relative">
                            <i data-lucide="disc-3" class="w-24 h-24 text-zinc-600"></i>
                            <div class="absolute w-12 h-12 bg-zinc-950 rounded-full border-2 border-zinc-800"></div>
                        </div>
                    </div>
                    
                    <h2 id="display-title" class="text-2xl font-black text-white mb-2 truncate">Ready to Compose</h2>
                    <p id="display-style" class="text-cyan-500/80 text-xs font-bold uppercase tracking-[0.2em] mb-6">Select or Generate a Track</p>
                    
                    <div class="w-full h-1 bg-zinc-800 rounded-full overflow-hidden mb-8">
                        <div id="playback-bar" class="w-1/3 h-full bg-cyan-500 shadow-[0_0_10px_#06b6d4]"></div>
                    </div>

                    <div class="flex items-center justify-center gap-6">
                        <i data-lucide="skip-back" class="w-6 h-6 text-zinc-600"></i>
                        <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center text-black cursor-pointer hover:scale-105 transition-transform">
                            <i data-lucide="play" class="w-6 h-6 fill-current"></i>
                        </div>
                        <i data-lucide="skip-forward" class="w-6 h-6 text-zinc-600"></i>
                    </div>
                </div>
            </div>

            <div id="view-code" class="hidden flex-1 overflow-y-auto p-6 lg:p-12">
                <div class="max-w-2xl mx-auto space-y-6">
                    <div class="inline-block px-3 py-1 bg-cyan-500/10 border border-cyan-500/20 text-cyan-400 text-[10px] font-black uppercase tracking-widest rounded">Transcript</div>
                    <div id="output-lyrics" class="text-zinc-300 font-serif text-lg md:text-xl leading-relaxed whitespace-pre-wrap italic">
                        The silence is waiting for your melody...
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer class="p-4 border-t border-zinc-900 bg-zinc-950 flex-shrink-0">
        <div class="max-w-4xl mx-auto flex gap-4 items-end">
            <div class="flex-1 bg-zinc-900 border border-zinc-800 rounded-2xl focus-within:border-cyan-500/50 transition-colors p-2 flex items-end">
                <textarea id="user-input" rows="1" 
                    class="w-full bg-transparent border-none px-3 py-2 text-sm text-white focus:outline-none resize-none max-h-32"
                    placeholder="E.g. 80s Citypop with lyrics about a rainy night in Shibuya..."></textarea>
            </div>
            <button onclick="handleSend()" id="send-btn" class="h-12 w-12 bg-cyan-600 hover:bg-cyan-500 text-white rounded-2xl flex items-center justify-center transition-all shadow-lg shadow-cyan-900/20">
                <i data-lucide="sparkles" class="w-5 h-5"></i>
            </button>
        </div>
    </footer>

    <div id="settings-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <div class="bg-zinc-900 border border-zinc-800 w-full max-w-md rounded-3xl overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-zinc-800 flex justify-between items-center bg-zinc-950/50">
                <h3 class="font-bold text-lg flex items-center gap-2"><i data-lucide="cpu" class="w-5 h-5 text-cyan-500"></i> Gemini Engine</h3>
                <button onclick="toggleSettings(false)" class="text-zinc-500 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            <div class="p-8 space-y-5">
                <div>
                    <label class="block text-[10px] font-black text-zinc-500 uppercase mb-2 tracking-widest">Gemini API Key</label>
                    <input id="setting-key" type="password" placeholder="Enter your Google AI Key" 
                        class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-cyan-400 focus:ring-1 focus:ring-cyan-500 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-zinc-500 uppercase mb-2 tracking-widest">Preferred Model</label>
                    <select id="setting-model" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-white outline-none">
                        <option value="gemini-1.5-flash">Gemini 1.5 Flash (Fast)</option>
                        <option value="gemini-1.5-pro">Gemini 1.5 Pro (High Quality)</option>
                        <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash (Next Gen)</option>
                    </select>
                </div>
                <button onclick="saveSettings()" class="w-full bg-cyan-600 text-white font-bold py-4 rounded-xl mt-4 hover:bg-cyan-500 transition-all shadow-lg shadow-cyan-900/40">INITIALIZE ENGINE</button>
            </div>
        </div>
    </div>

    <script>
        const SYSTEM_PROMPT = `You are a professional music composer. Generate a complete song concept based on the user's prompt. 
        Return ONLY a JSON object with this exact structure:
        {
            "title": "Song Title",
            "style": "Specific Genre/Style Description",
            "lyrics": "Full song lyrics with [Verse], [Chorus] markers",
            "mood": "Brief mood description"
        }`;

        let projects = JSON.parse(localStorage.getItem('gemini_suno_projects') || '[]');
        let currentProjectId = null;

        function init() {
            lucide.createIcons();
            loadSettings();
            renderProjects();
            const tx = document.getElementById('user-input');
            tx.oninput = function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; };
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const btn = document.getElementById('send-btn');
            const apiKey = document.getElementById('setting-key').value;
            const model = document.getElementById('setting-model').value;

            if (!input.value.trim() || !apiKey) {
                if(!apiKey) toggleSettings(true);
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-white border-t-transparent animate-spin rounded-full"></div>`;

            try {
                // Gemini Direct API URL
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: `${SYSTEM_PROMPT}\n\nUser Request: ${input.value}` }]
                        }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                // Anti-Crash Logic
                const rawText = await response.text();
                if (!response.ok) {
                    const errorData = JSON.parse(rawText);
                    throw new Error(errorData.error?.message || "Gemini API Error");
                }

                const data = JSON.parse(rawText);
                const result = JSON.parse(data.candidates[0].content.parts[0].text);

                const newProject = {
                    id: Date.now(),
                    ...result,
                    timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                };

                projects.unshift(newProject);
                localStorage.setItem('gemini_suno_projects', JSON.stringify(projects));
                displayProject(newProject.id);
                input.value = '';
            } catch (err) {
                alert("Engine Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="sparkles" class="w-5 h-5"></i>`;
                lucide.createIcons();
            }
        }

        function displayProject(id) {
            const p = projects.find(x => x.id === id);
            if (!p) return;
            currentProjectId = id;
            document.getElementById('display-title').innerText = p.title;
            document.getElementById('display-style').innerText = p.style;
            document.getElementById('output-lyrics').innerText = p.lyrics;
            document.getElementById('vinyl-record').classList.add('animate-spin');
            setTimeout(() => document.getElementById('vinyl-record').classList.remove('animate-spin'), 1000);
            renderProjects();
        }

        function renderProjects() {
            const list = document.getElementById('project-list');
            list.innerHTML = projects.map(p => `
                <button onclick="displayProject(${p.id})" class="w-full text-left p-4 rounded-2xl transition-all group ${currentProjectId === p.id ? 'bg-cyan-600/10 border border-cyan-500/30' : 'hover:bg-zinc-900 border border-transparent'}">
                    <div class="text-white font-bold truncate text-sm">${p.title}</div>
                    <div class="flex justify-between items-center mt-1">
                        <span class="text-[10px] text-zinc-500 font-bold uppercase tracking-tighter">${p.mood || 'Track'}</span>
                        <span class="text-[10px] text-zinc-600">${p.timestamp}</span>
                    </div>
                </button>
            `).join('');
        }

        function setView(view) {
            const isPrev = view === 'preview';
            document.getElementById('view-preview').classList.toggle('hidden', !isPrev);
            document.getElementById('view-code').classList.toggle('hidden', isPrev);
            document.getElementById('btn-preview').className = isPrev ? 'px-4 py-1 text-xs font-bold rounded-full bg-cyan-600 text-white' : 'px-4 py-1 text-xs font-bold rounded-full text-zinc-500';
            document.getElementById('btn-code').className = !isPrev ? 'px-4 py-1 text-xs font-bold rounded-full bg-cyan-600 text-white' : 'px-4 py-1 text-xs font-bold rounded-full text-zinc-500';
        }

        function toggleSettings(show) { document.getElementById('settings-modal').classList.toggle('hidden', !show); }
        function saveSettings() {
            localStorage.setItem('gemini_config', JSON.stringify({
                key: document.getElementById('setting-key').value,
                model: document.getElementById('setting-model').value
            }));
            toggleSettings(false);
        }
        function loadSettings() {
            const saved = JSON.parse(localStorage.getItem('gemini_config') || '{}');
            if(saved.key) document.getElementById('setting-key').value = saved.key;
            if(saved.model) document.getElementById('setting-model').value = saved.model;
        }
        function createNewProject() {
            currentProjectId = null;
            document.getElementById('display-title').innerText = "New Song";
            document.getElementById('display-style').innerText = "Waiting for prompt...";
            document.getElementById('output-lyrics').innerText = "The silence is waiting for your melody...";
            renderProjects();
        }
        function downloadProject() {
            if(!currentProjectId) return;
            const p = projects.find(x => x.id === currentProjectId);
            const blob = new Blob([JSON.stringify(p, null, 2)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `SunoGem_${p.title}.json`;
            a.click();
        }

        window.onload = init;
    </script>
</body>
</html>
