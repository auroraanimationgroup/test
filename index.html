<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SunoGem AI | Direct Gemini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { min-height: 100dvh; display: flex; flex-direction: column; overflow: hidden; background-color: #09090b; color: #fafafa; }
        .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-vinyl { animation: spin-slow 3s linear infinite; }
    </style>
</head>
<body class="font-sans">

    <header class="h-14 border-b border-zinc-800 flex items-center justify-between px-4 flex-shrink-0 bg-black">
        <div class="flex items-center gap-2">
            <div class="flex gap-1.5">
                <div class="w-3 h-3 rounded-full bg-zinc-800"></div>
                <div class="w-3 h-3 rounded-full bg-zinc-800"></div>
                <div class="w-3 h-3 rounded-full bg-zinc-800"></div>
            </div>
            <span class="ml-4 font-bold tracking-tighter text-xl">SUNO<span class="text-cyan-400">GEM</span></span>
        </div>
        
        <div class="flex items-center gap-2">
            <button onclick="setView('preview')" id="btn-preview" class="px-3 py-1 text-xs font-bold rounded bg-cyan-500 text-black">PLAYER</button>
            <button onclick="setView('code')" id="btn-code" class="px-3 py-1 text-xs font-bold rounded text-zinc-400 hover:text-white">LYRICS</button>
            <button onclick="downloadProject()" class="p-2 text-zinc-400"><i data-lucide="download" class="w-4 h-4"></i></button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-64 border-r border-zinc-800 flex flex-col hidden md:flex flex-shrink-0 bg-zinc-950">
            <div class="p-4">
                <button onclick="createNewProject()" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black rounded-lg py-2.5 flex items-center justify-center gap-2 font-bold transition-all">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> New Song
                </button>
            </div>
            <div class="flex-1 overflow-y-auto px-2 space-y-1 custom-scroll" id="project-list"></div>
            <div class="p-4 border-t border-zinc-800">
                <button onclick="toggleSettings(true)" class="flex items-center gap-3 text-zinc-500 hover:text-white w-full transition-colors">
                    <i data-lucide="key" class="w-5 h-5"></i>
                    <span class="text-xs font-bold uppercase tracking-widest">Gemini API Key</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative bg-zinc-900/20">
            <div id="view-preview" class="flex-1 flex flex-col items-center justify-center p-6">
                <div id="vinyl-container" class="w-64 h-64 bg-zinc-800 rounded-full border-8 border-zinc-900 flex items-center justify-center relative shadow-2xl mb-8">
                    <div class="absolute inset-0 rounded-full border border-white/5"></div>
                    <i data-lucide="music" class="w-16 h-16 text-zinc-600"></i>
                    <div class="w-10 h-10 bg-zinc-950 rounded-full border-4 border-zinc-900 absolute"></div>
                </div>
                <h2 id="display-title" class="text-2xl font-bold text-center">Ready to generate</h2>
                <p id="display-style" class="text-cyan-500 text-sm font-mono mt-2 uppercase tracking-widest">Awaiting prompt...</p>
            </div>

            <div id="view-code" class="hidden flex-1 overflow-y-auto p-6 md:p-12">
                <pre id="output-lyrics" class="max-w-2xl mx-auto whitespace-pre-wrap font-serif text-lg text-zinc-400 leading-relaxed italic"></pre>
            </div>
        </main>
    </div>

    <footer class="p-4 border-t border-zinc-800 bg-black flex-shrink-0">
        <div class="max-w-4xl mx-auto flex gap-3">
            <textarea id="user-input" rows="1" class="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-cyan-500 resize-none" placeholder="Describe your song (Style, Mood, Lyrics)..."></textarea>
            <button onclick="handleSend()" id="send-btn" class="bg-white text-black p-3 rounded-xl hover:bg-cyan-400 transition-all flex-shrink-0">
                <i data-lucide="sparkles" class="w-5 h-5"></i>
            </button>
        </div>
    </footer>

    <div id="settings-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="bg-zinc-900 border border-zinc-800 w-full max-w-md rounded-2xl overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-zinc-800 flex justify-between items-center">
                <h2 class="font-bold text-lg">Gemini AI Settings</h2>
                <button onclick="toggleSettings(false)" class="text-zinc-500"><i data-lucide="x"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-zinc-500 uppercase mb-1">Google Gemini API Key</label>
                    <input id="setting-key" type="password" placeholder="Enter Gemini Key" class="w-full bg-black border border-zinc-800 rounded-lg px-4 py-3 text-sm text-cyan-400 outline-none focus:border-cyan-500">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-zinc-500 uppercase mb-1">Model Version</label>
                    <select id="setting-model" class="w-full bg-black border border-zinc-800 rounded-lg px-4 py-3 text-sm outline-none">
                        <option value="gemini-1.5-flash">Gemini 1.5 Flash (Recommended)</option>
                        <option value="gemini-1.5-pro">Gemini 1.5 Pro (Deep Lyrics)</option>
                    </select>
                </div>
                <button onclick="saveSettings()" class="w-full bg-cyan-500 text-black font-black py-3 rounded-lg hover:bg-cyan-400 transition-all">APPLY SETTINGS</button>
            </div>
        </div>
    </div>

    <script>
        const SYSTEM_PROMPT = `You are a Music Composer. Respond ONLY in JSON: {"title": "Title", "style": "Genre", "lyrics": "Lyrics"}`;
        let projects = JSON.parse(localStorage.getItem('sg_projects') || '[]');
        let currentId = null;

        function init() {
            lucide.createIcons();
            const saved = JSON.parse(localStorage.getItem('sg_config') || '{}');
            if(saved.key) document.getElementById('setting-key').value = saved.key;
            if(saved.model) document.getElementById('setting-model').value = saved.model;
            renderProjects();
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const key = document.getElementById('setting-key').value;
            const model = document.getElementById('setting-model').value;
            const btn = document.getElementById('send-btn');

            if (!input.value.trim() || !key) { if(!key) toggleSettings(true); return; }

            btn.disabled = true;
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-black border-t-transparent animate-spin rounded-full"></div>`;

            try {
                // Direct Gemini Endpoint
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `${SYSTEM_PROMPT}\n\nUser: ${input.value}` }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const text = await response.text();
                if (!response.ok) { alert("Gemini API Error: " + text); return; }

                const data = JSON.parse(text);
                const result = JSON.parse(data.candidates[0].content.parts[0].text);

                const proj = { id: Date.now(), ...result, time: new Date().toLocaleTimeString() };
                projects.unshift(proj);
                localStorage.setItem('sg_projects', JSON.stringify(projects));
                loadProject(proj.id);
                input.value = '';
            } catch (e) {
                alert("Critical Error: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="sparkles" class="w-5 h-5"></i>`;
                lucide.createIcons();
            }
        }

        function loadProject(id) {
            const p = projects.find(x => x.id === id);
            currentId = id;
            document.getElementById('display-title').innerText = p.title;
            document.getElementById('display-style').innerText = p.style;
            document.getElementById('output-lyrics').innerText = p.lyrics;
            document.getElementById('vinyl-container').classList.add('animate-vinyl');
            renderProjects();
        }

        function renderProjects() {
            document.getElementById('project-list').innerHTML = projects.map(p => `
                <button onclick="loadProject(${p.id})" class="w-full text-left p-3 rounded-lg text-sm ${currentId === p.id ? 'bg-zinc-800' : 'text-zinc-500 hover:bg-zinc-900'}">
                    <div class="font-bold truncate">${p.title}</div>
                    <div class="text-[10px] opacity-50 uppercase">${p.time}</div>
                </button>
            `).join('');
        }

        function setView(v) {
            document.getElementById('view-preview').classList.toggle('hidden', v !== 'preview');
            document.getElementById('view-code').classList.toggle('hidden', v !== 'code');
        }

        function toggleSettings(s) { document.getElementById('settings-modal').classList.toggle('hidden', !s); }
        function saveSettings() {
            localStorage.setItem('sg_config', JSON.stringify({
                key: document.getElementById('setting-key').value,
                model: document.getElementById('setting-model').value
            }));
            toggleSettings(false);
        }
        function createNewProject() { location.reload(); }
        function downloadProject() {
            const p = projects.find(x => x.id === currentId);
            if(!p) return;
            const blob = new Blob([JSON.stringify(p, null, 2)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Song_${p.title}.json`;
            a.click();
        }

        window.onload = init;
    </script>
</body>
</html>
